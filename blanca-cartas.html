<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartas para Blanca - Iñaki Moreno</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #FAF9F5;
            --color-text: #1F2328;
            --color-text-muted: #57606A;
            --color-accent: #CC785C;
            --color-accent-soft: rgba(204, 120, 92, 0.12);
            --color-border: #D8DEE4;
            --color-surface: #FFFFFF;
            --font-serif: 'Instrument Serif', Georgia, serif;
            --font-sans: 'DM Sans', -apple-system, sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-sans);
            background: var(--color-bg);
            color: var(--color-text);
            line-height: 1.7;
            font-size: 16px;
        }
        .container { max-width: 700px; margin: 0 auto; padding: 0 24px; }
        nav {
            padding: 20px 0;
            display: flex;
            gap: 24px;
            justify-content: center;
            flex-wrap: wrap;
        }
        nav a {
            color: var(--color-text-muted);
            text-decoration: none;
            font-size: 0.9rem;
        }
        nav a:hover { color: var(--color-accent); }
        nav a:focus {
            color: var(--color-accent);
            outline: 2px solid var(--color-accent);
            outline-offset: 2px;
        }

        .page-header {
            padding: 48px 0 24px;
            text-align: center;
        }
        .page-header h1 {
            font-family: var(--font-serif);
            font-size: 2.2rem;
            font-weight: 400;
            margin-bottom: 8px;
        }
        .page-header p {
            color: var(--color-text-muted);
            font-size: 1rem;
        }

        .screenshot {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 16px;
            overflow: hidden;
            margin: 24px 0;
        }
        .screenshot img {
            width: 100%;
            display: block;
        }
        .screenshot-placeholder {
            height: 320px;
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd9 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .screenshot-placeholder .icon { font-size: 3rem; margin-bottom: 16px; }
        .screenshot-placeholder .title { font-size: 1.3rem; font-weight: 500; color: #c2185b; margin-bottom: 8px; }
        .screenshot-placeholder .desc { font-size: 0.9rem; color: #880e4f; }

        .cta {
            text-align: center;
            margin: 24px 0 48px;
        }
        .cta-button {
            display: inline-block;
            background: var(--color-accent);
            color: white;
            padding: 14px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
        }
        .cta-disabled {
            opacity: 0.6;
            cursor: default;
        }

        footer {
            padding: 32px 0;
            border-top: 1px solid var(--color-border);
            text-align: center;
            font-size: 0.9rem;
            color: var(--color-text-muted);
        }
        footer a { color: var(--color-accent); text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <a href="index.html">Home</a>
            <a href="story.html">My Story</a>
            <a href="deals.html">AI Deals</a>
            <a href="blog.html">Writing</a>
        </nav>

        <header class="page-header">
            <h1>Cartas para Blanca</h1>
            <p>Letters to my daughter. Milestones, memories, and lessons captured with AI.</p>
        </header>

        <div class="screenshot">
            <div class="screenshot-placeholder">
                <div class="icon">💌</div>
                <div class="title">Private Collection</div>
                <div class="desc">Letters · Milestones · Memories</div>
            </div>
        </div>

        <div class="cta">
            <span class="cta-button cta-disabled">Private · For Blanca Only 💌</span>
        </div>

        <footer>
            <a href="index.html">← Back to Home</a>
        </footer>
    </div>
</body>
</html>
